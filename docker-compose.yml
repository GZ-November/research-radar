services:
  research-radar:
    build: .
    ports:
      - "8501:8501"
    # SQLite database and settings saved via the Settings page live under data/;
    # mounting this volume preserves them across container rebuilds.
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # To reach a local Ollama instance (macOS / Windows):
    # set the Ollama base URL to http://host.docker.internal:11434 in the
    # Settings page.  On Linux uncomment the two lines below:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
